<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Showing | Ticket-Hub</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="interface.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="navbar">
        <div class="navbar-content">
            <div class="logo-section">
                <h1 class="logo">
                    <i class="fas fa-film"></i>
                    Ticket-Hub
                </h1>
            </div>
            <nav class="nav-links">
                <a href="interface.html" class="active">
                    <i class="fas fa-play-circle"></i>
                    Now Showing
                </a>
                <a href="#">
                    <i class="fas fa-clock"></i>
                    Coming Soon
                </a>
                <a href="#">
                    <i class="fas fa-map-marker-alt"></i>
                    Theaters
                </a>
            </nav>
            <div class="user-profile">
                <a href="profile.html" class="profile-link">
                    <button class="profile-btn">
                        <i class="fas fa-user"></i>
                        My Profile
                    </button>
                </a>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Discover Amazing Movies</h1>
                <p class="hero-subtitle">Book your tickets for the latest blockbusters</p>
            </div>
        </div>

        <div class="controls">
            <div class="controls-header">
                <h2>
                    <i class="fas fa-calendar-alt"></i>
                    Movies Showing Today
                </h2>
                <div class="movie-count">
                    <span id="movie-count">12</span> movies available
                </div>
            </div>
            <div class="filter-group">
                <label for="genre-filter">
                    <i class="fas fa-filter"></i>
                    Filter by Genre:
                </label>
                <select id="genre-filter">
                    <option value="All">All Genres</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Horror">Horror</option>
                    <option value="Animation">Animation</option>
                    <option value="Drama">Drama</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </div>
        </div>

        <div class="movie-grid" id="movie-grid">
            <!-- Movie cards are now dynamically rendered by interface.js, not static HTML. -->
        </div>
    </div>

    <script src="interface.js"></script>
</body>

</html>
