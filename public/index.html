<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket-Hub | Premium Movie Booking Experience</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="beauty.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/21q_HZs90KG_MkCZeDMO8mBko_k1z5TOyyJKiNLsT1E/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4x/MS5iaWdjb21tZXJj/ZS5jb20vcy15emdv/ai9pbWFnZXMvc3Rl/bnNpbC81MDB4NjU5/L3Byb2R1Y3RzLzM4/ODQ2NC80MzkyOTYx/L2FwaXp3cG8wdV9f/NzM5MjAuMTYyNTY3/MTQxMS5qcGc_Yz0y" alt="No Hard Feelings">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/7YSrsykJdXB4GVHhvovJWWP6Bqz3x5Fhd8Iomu4Cm8I/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzL2M4Lzkx/LzVmL2M4OTE1ZjUx/MzI2NTI2NGY5Y2U2/ODZlM2ZhMzU1ZWZk/LmpwZw" alt="It">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/-D-Kx4y16UycwiNRngMvhE_Ow4Nl-XThdOPleK_pt-A/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9hcnRv/ZnRoZW1vdmllcy5j/by51ay9jZG4vc2hv/cC9maWxlcy9JTUdf/NjA4OF83MjB4QDJ4/LmpwZz92PTE3MTA2/MDY4MDU" alt="Inside Out 2">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/qZ82l4RY_YmEgAcQmW20z09-G1ZRoTC-9RIys_AABQM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzL2FiLzNk/LzYzL2FiM2Q2MzU4/YzdlZTkzOTIzZGU4/Y2FlYzA4NmFhMjU5/LmpwZw" alt="The Batman">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/MicuQW092xH4iHdhVG0QUuvYaaJJVdRhsjt9UT6zSgM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tLm1l/ZGlhLWFtYXpvbi5j/b20vaW1hZ2VzL0kv/OTFoSU4rZE5ZVUwu/anBn" alt="Avengers: Endgame">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/HUMA7LKyDRVCznGJ1XNUXjDVBlAK2bKR_hWhTAePFUQ/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzNhLzEw/LzE1LzNhMTAxNTJj/MTE5ODE0NDgyOWJk/YzcxNWQ2YzM0M2Ix/LmpwZw" alt="Oppenheimer">
            </div>
            <div class="movie-slide">
                <img src="https://imgs.search.brave.com/Wz_rdLaVKvgyS0HgMhddn6v40RrF21QVnlEK61D708I/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJhY2Nlc3Mu/Y29tL2Z1bGwvMTI2/NDY4OS5qcGc" alt="Inception">
            </div>
        </div>
        <div class="floating-elements"></div>
        
        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Welcome to <span class="logo-gradient">Ticket-Hub</span></h1>
                <p class="hero-subtitle">Your premium destination for movie bookings</p>
                <div class="hero-features">
                    <div class="feature-item">
                        <i class="fas fa-ticket-alt"></i>
                        <span>Easy Booking</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Payment</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-star"></i>
                        <span>Premium Experience</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-box">
            <div class="form-header">
                <h1 class="logo">
                    <i class="fas fa-film"></i>
                    Ticket-Hub
                </h1>
                <p class="form-subtitle">Join thousands of movie lovers</p>
            </div>

            <form id="signup-form" class="form-panel active">
                <h2>Create Your Account</h2>
                
                <div class="input-group">
                    <label for="reg-username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="reg-username" placeholder="Choose a username" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="reg-email" placeholder="user@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-confirm-password">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="reg-role">
                        <i class="fas fa-user-tag"></i>
                        Register as
                    </label>
                    <select id="reg-role">
                        <option value="Customer" selected>Customer</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>

                <div id="admin-extra" style="display:none;">
                    <div class="input-group">
                        <label for="reg-theatre-name">
                            <i class="fas fa-building"></i>
                            Theatre Name (Admin)
                        </label>
                        <input type="text" id="reg-theatre-name" placeholder="e.g. CityPlex" >
                    </div>
                    <div class="input-group">
                        <label for="reg-theatre-pass">
                            <i class="fas fa-key"></i>
                            Theatre Pass (Admin)
                        </label>
                        <input type="password" id="reg-theatre-pass" placeholder="Set a theatre pass" >
                    </div>
                </div>
                
                <button type="submit" class="cta-button">
                    <i class="fas fa-user-plus"></i>
                    Sign Up
                </button>
                
                <p class="switch-text">
                    Already have an account? <a href="#" id="show-login">Log In</a>
                </p>
            </form>

            <form id="login-form" class="form-panel">
                <h2>Welcome Back</h2>
                
                <div class="input-group">
                    <label for="login-email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="login-email" placeholder="user@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                
                <p class="forgot-password">
                    <a href="#">
                        <i class="fas fa-question-circle"></i>
                        Forgot Password?
                    </a>
                </p>
                
                <button type="submit" class="cta-button">
                    <i class="fas fa-sign-in-alt"></i>
                    Log In
                </button>
                
                <p class="switch-text">
                    Don't have an account? <a href="#" id="show-signup">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
